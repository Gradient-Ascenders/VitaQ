<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | VitaQ</title>
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />
  <link rel="stylesheet" href="/assets/css/output.css" />
</head>
<body class="min-h-screen overflow-x-hidden bg-[#1a1b26] text-[#c0caf5]">
  <main class="relative flex min-h-screen items-center justify-center px-6 py-12">
    <section
      aria-hidden="true"
      class="pointer-events-none absolute inset-0 overflow-hidden"
    >
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(122,162,247,0.10),transparent_32%),radial-gradient(circle_at_bottom,rgba(187,154,247,0.12),transparent_30%)]"></div>

      <div class="absolute left-[12%] top-[18%] h-40 w-40 animate-pulse rounded-full bg-[#7aa2f7]/10 blur-3xl"></div>
      <div class="absolute bottom-[14%] right-[16%] h-52 w-52 animate-pulse rounded-full bg-[#bb9af7]/10 blur-3xl [animation-delay:1200ms]"></div>
      <div class="absolute left-[45%] bottom-[8%] h-44 w-44 animate-pulse rounded-full bg-[#7dcfff]/8 blur-3xl [animation-delay:700ms]"></div>
    </section>

    <div class="vitaq-logo-shell">
      <div class="vitaq-logo-floating">
        <a
          href="/"
          aria-label="Go to home page"
          title="Go to home page"
          class="pointer-events-auto w-fit vitaq-logo-link"
        >
          <img
            src="/assets/images/vitaq-logo.png"
            alt="VitaQ logo"
            class="vitaq-logo-image"
          />
        </a>
      </div>
    </div>

    <section
      class="relative z-10 w-full max-w-md rounded-[2rem] border border-white/10 bg-[#1f2335]/85 p-7 shadow-[0_24px_80px_rgba(0,0,0,0.32)] backdrop-blur-xl sm:p-8"
      aria-labelledby="login-heading"
    >
      <header class="mb-8 text-center">
        <p class="mx-auto mb-4 inline-flex items-center rounded-full border border-[#7aa2f7]/25 bg-[#7aa2f7]/10 px-4 py-1 text-xs font-semibold uppercase tracking-[0.22em] text-[#7dcfff]">
          Secure patient access
        </p>
        <h1
          id="login-heading"
          class="text-4xl font-bold tracking-tight text-[#e0e5ff]"
        >
          Welcome back.
        </h1>

        <p class="mt-3 text-base leading-6 text-[#a9b1d6]">
          Log in to your VitaQ account to manage appointments, track bookings,
          and stay updated on your next clinic visit.
        </p>
      </header>

      <p
        id="errorMessage"
        class="hidden mb-4 rounded-2xl border border-[#f7768e]/30 bg-[#3b1f2b] px-4 py-3 text-sm text-[#f7768e]"
        aria-live="polite"
      ></p>

      <form id="loginForm" class="space-y-4">
        <section>
          <label
            for="email"
            class="mb-2 block text-sm font-medium text-[#c0caf5]"
          >
            Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address..."
            required
            class="w-full rounded-2xl border border-[#414868] bg-[#24283b]/90 px-4 py-3 text-[#e0e5ff] placeholder-[#7f85a3] shadow-sm outline-none transition focus:border-[#7aa2f7] focus:ring-2 focus:ring-[#7aa2f7]/30"
          />
        </section>

        <section>
          <div class="mb-2 flex items-center justify-between">
            <label
              for="password"
              class="block text-sm font-medium text-[#c0caf5]"
            >
              Password
            </label>
          </div>

          <section class="relative">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password..."
              required
              class="w-full rounded-2xl border border-[#414868] bg-[#24283b]/90 px-4 py-3 pr-16 text-[#e0e5ff] placeholder-[#7f85a3] shadow-sm outline-none transition focus:border-[#7aa2f7] focus:ring-2 focus:ring-[#7aa2f7]/30"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute inset-y-0 right-4 flex items-center text-sm font-medium text-[#7aa2f7] transition hover:text-[#bb9af7]"
            >
              Show
            </button>
          </section>
        </section>

        <button
          type="submit"
          id="loginButton"
          class="mt-2 w-full rounded-2xl bg-gradient-to-r from-[#7aa2f7] to-[#bb9af7] px-4 py-3 text-base font-semibold text-[#1a1b26] transition hover:scale-[1.01] hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-[#7aa2f7]/40"
        >
          Continue
        </button>
      </form>

      <section class="my-8 flex items-center gap-4" aria-hidden="true">
        <span class="h-px flex-1 bg-[#414868]"></span>
        <span class="text-sm text-[#7f85a3]">or continue with</span>
        <span class="h-px flex-1 bg-[#414868]"></span>
      </section>

      <section class="flex gap-3">
        <button
          type="button"
          id="googleLoginButton"
          data-oauth-provider="google"
          data-provider-label="Google"
          aria-label="Sign in with Google"
          class="group min-w-0 flex-1 rounded-2xl border border-[#414868] bg-[#24283b]/90 px-4 py-4 text-sm font-medium text-[#c0caf5] shadow-sm transition hover:-translate-y-0.5 hover:border-[#7aa2f7] hover:bg-[#2a2f45]"
        >
          <span class="flex flex-col items-center gap-3">
            <span class="flex h-12 w-12 items-center justify-center rounded-2xl border border-white/10 bg-white/95 shadow-[0_8px_24px_rgba(0,0,0,0.18)] transition group-hover:scale-105">
              <img
                src="https://www.google.com/favicon.ico"
                alt=""
                class="h-6 w-6 object-contain"
              />
            </span>
            <span class="text-sm font-semibold text-[#e0e5ff]">Google</span>
          </span>
        </button>
        <button
          type="button"
          id="microsoftLoginButton"
          data-oauth-provider="azure"
          data-provider-label="Microsoft"
          aria-label="Sign in with Microsoft"
          class="group min-w-0 flex-1 rounded-2xl border border-[#414868] bg-[#24283b]/90 px-4 py-4 text-sm font-medium text-[#c0caf5] shadow-sm transition hover:-translate-y-0.5 hover:border-[#7aa2f7] hover:bg-[#2a2f45]"
        >
          <span class="flex flex-col items-center gap-3">
            <span class="flex h-12 w-12 items-center justify-center rounded-2xl border border-white/10 bg-white/95 shadow-[0_8px_24px_rgba(0,0,0,0.18)] transition group-hover:scale-105">
              <img
                src="https://www.microsoft.com/favicon.ico"
                alt=""
                class="h-6 w-6 object-contain"
              />
            </span>
            <span class="text-sm font-semibold text-[#e0e5ff]">Microsoft</span>
          </span>
        </button>
      </section>

      <p class="mt-8 text-center text-sm text-[#8b93b8]">
        New user?
        <a
          href="/register"
          class="font-medium text-[#7aa2f7] underline underline-offset-2 hover:text-[#bb9af7]"
        >
          Sign up
        </a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lib/supabaseClient.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/features/login.js"></script>
  <script>
    redirectIfAuthenticated();
  </script>
</body>
</html>
