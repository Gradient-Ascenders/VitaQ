<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | VitaQ</title>
  <link rel="stylesheet" href="../../assets/css/output.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col">
  <header>
    <nav class="bg-white shadow-sm border-b" aria-label="Main navigation">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center" aria-label="Go to home page">
            <img src="../../assets/images/vitaq-logo.png" alt="VitaQ logo" class="h-12 w-auto" />
        </a>

        <ul class="flex items-center gap-3">
          <li>
            <a href="/login" class="text-sm font-medium text-slate-600 hover:text-blue-700">
              Login
            </a>
          </li>
          <li>
            <a href="/register" class="text-sm font-medium bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
              Register
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <section aria-labelledby="register-heading" class="w-full max-w-md">
      <article class="bg-white rounded-2xl shadow-md border border-slate-200 p-8">
        <header class="text-center mb-6">
          <h1 id="register-heading" class="text-2xl font-bold text-slate-900">
            Create Account
          </h1>
          <p class="text-sm text-slate-500 mt-2">
            Register to book clinic appointments and manage your queue status.
          </p>
        </header>

        <p
          id="messageBox"
          class="hidden mb-4 rounded-lg px-4 py-3 text-sm"
          role="alert"
          aria-live="polite"
        ></p>

        <form id="registerForm" class="space-y-5" novalidate>
          <section>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1">
              Email
            </label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              aria-describedby="emailError"
            />
            <p id="emailError" class="mt-1 text-sm text-red-600 hidden"></p>
          </section>

          <section>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-1">
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              placeholder="Enter password"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              aria-describedby="passwordError"
            />
            <p id="passwordError" class="mt-1 text-sm text-red-600 hidden"></p>
          </section>

          <section>
            <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">
              Confirm Password
            </label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              autocomplete="new-password"
              placeholder="Confirm password"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              aria-describedby="confirmPasswordError"
            />
            <p id="confirmPasswordError" class="mt-1 text-sm text-red-600 hidden"></p>
          </section>

          <button
            id="registerButton"
            type="submit"
            class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition"
          >
            Register
          </button>
        </form>

        <p class="text-sm text-center text-slate-600 mt-6">
          Already have an account?
          <a href="/login" class="text-blue-600 font-medium hover:underline">Login</a>
        </p>
      </article>
    </section>
  </main>

  <footer class="bg-white border-t">
    <div class="max-w-6xl mx-auto px-6 py-4 text-center text-sm text-slate-500">
      VitaQ · Community Clinic Appointment & Queue System · Software Design 2026
    </div>
  </footer>

  <script>
    const registerForm = document.getElementById("registerForm");
    const messageBox = document.getElementById("messageBox");

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");

    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const confirmPasswordError = document.getElementById("confirmPasswordError");

    function showMessage(message, type = "error") {
      messageBox.textContent = message;
      messageBox.classList.remove(
        "hidden",
        "bg-red-100",
        "text-red-700",
        "border",
        "border-red-200",
        "bg-green-100",
        "text-green-700",
        "border-green-200"
      );

      if (type === "success") {
        messageBox.classList.add("bg-green-100", "text-green-700", "border", "border-green-200");
      } else {
        messageBox.classList.add("bg-red-100", "text-red-700", "border", "border-red-200");
      }
    }

    function hideMessage() {
      messageBox.classList.add("hidden");
      messageBox.textContent = "";
    }

    function showFieldError(element, message) {
      element.textContent = message;
      element.classList.remove("hidden");
    }

    function hideFieldError(element) {
      element.textContent = "";
      element.classList.add("hidden");
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    registerForm.addEventListener("submit", function (e) {
      e.preventDefault();

      hideMessage();
      hideFieldError(emailError);
      hideFieldError(passwordError);
      hideFieldError(confirmPasswordError);

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      let isValid = true;

      if (!email) {
        showFieldError(emailError, "Email is required.");
        isValid = false;
      } else if (!validateEmail(email)) {
        showFieldError(emailError, "Please enter a valid email address.");
        isValid = false;
      }

      if (!password) {
        showFieldError(passwordError, "Password is required.");
        isValid = false;
      } else if (password.length < 6) {
        showFieldError(passwordError, "Password must be at least 6 characters long.");
        isValid = false;
      }

      if (!confirmPassword) {
        showFieldError(confirmPasswordError, "Please confirm your password.");
        isValid = false;
      } else if (password !== confirmPassword) {
        showFieldError(confirmPasswordError, "Passwords do not match.");
        isValid = false;
      }

      if (!isValid) {
        showMessage("Please fix the errors in the form.");
        return;
      }

      showMessage("Validation passed. Ready to connect to Supabase.", "success");
    });
  </script>
</body>
</html>
