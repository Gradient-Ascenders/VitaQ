<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Booked | VitaQ</title>
  <link rel="stylesheet" href="/assets/css/output.css" />
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <header class="border-b border-white/10 bg-slate-950/90 backdrop-blur">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4" aria-label="Main navigation">
      <a href="/dashboard" class="text-xl font-bold tracking-tight text-cyan-400">VitaQ</a>
      <ul class="flex items-center gap-3 text-sm font-medium">
        <li>
          <a
            href="/dashboard"
            class="rounded-full border border-cyan-400/30 bg-cyan-400/10 px-4 py-2 text-cyan-300 transition hover:bg-cyan-400/20"
          >
            Dashboard
          </a>
        </li>
        <li>
          <a
            href="/appointments"
            class="rounded-full border border-white/15 bg-white/5 px-4 py-2 text-slate-200 transition hover:bg-white/10"
          >
            My Appointments
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="mx-auto flex max-w-4xl px-6 py-16">
    <section class="w-full rounded-[2rem] border border-white/10 bg-gradient-to-br from-slate-900 via-slate-900 to-blue-950 p-8 shadow-2xl shadow-cyan-950/30">
      <p class="mb-3 text-sm font-semibold uppercase tracking-[0.25em] text-emerald-300">
        Booking Confirmed
      </p>

      <h1 class="text-4xl font-bold tracking-tight text-white">
        Appointment Booked
      </h1>

      <p class="mt-3 text-slate-300">
        Your appointment has been booked successfully.
      </p>

      <section class="mt-8 grid gap-4 sm:grid-cols-3">
        <article class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Clinic</p>
          <p id="confirmClinic" class="mt-2 text-base font-medium text-white"></p>
        </article>

        <article class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Date</p>
          <p id="confirmDate" class="mt-2 text-base font-medium text-white"></p>
        </article>

        <article class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Time</p>
          <p id="confirmTime" class="mt-2 text-base font-medium text-white"></p>
        </article>
      </section>

      <section class="mt-8 flex flex-col gap-3 sm:flex-row">
        <a
          href="/dashboard"
          class="rounded-full border border-cyan-400/30 bg-cyan-400/10 px-5 py-3 text-center text-sm font-semibold text-cyan-200 transition hover:bg-cyan-400/20"
        >
          Back to Dashboard
        </a>

        <a
          href="/appointments"
          class="rounded-full border border-white/15 bg-white/5 px-5 py-3 text-center text-sm font-semibold text-slate-200 transition hover:bg-white/10"
        >
          View My Appointments
        </a>
      </section>
    </section>
  </main>

  <footer class="border-t border-white/10 bg-slate-950/90">
    <p class="mx-auto max-w-6xl px-6 py-5 text-center text-sm text-slate-400">
      Community Clinic Appointment &amp; Queue System
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lib/supabaseClient.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/features/booking-confirmation.js"></script>
  <script>
    requireAuthenticatedUser();
  </script>
</body>
</html>
