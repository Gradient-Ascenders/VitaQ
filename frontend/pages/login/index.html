<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic metadata for the login page -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | VitaQ</title>

  <!-- Compiled Tailwind stylesheet -->
  <link rel="stylesheet" href="../../assets/css/output.css" />
</head>
<body class="min-h-screen flex flex-col bg-gradient-to-br from-[#031126] via-[#071b34] to-[#0a2547] text-slate-100">

  <!-- Shared top navigation for public pages -->
  <header class="border-b border-cyan-400/10 bg-[#031126]/80 backdrop-blur-md">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between" aria-label="Main navigation">
      <a href="/" class="flex items-center gap-4 no-underline">
        <!-- Team logo -->
        <img
          src="../../assets/images/vitaq-logo.png" alt="VitaQ logo"
          alt="VitaQ logo"
          class="h-22 md:h-30 w-auto object-contain"
        />
      </a>

      <!-- Public navigation links -->
      <ul class="flex items-center gap-3 list-none m-0 p-0">
        <li>
          <a
            href="/login"
            class="px-4 py-2 rounded-xl text-sm font-semibold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 shadow-lg shadow-cyan-500/20 hover:scale-[1.02] transition"
          >
            Login
          </a>
        </li>
        <li>
          <a
            href="/register"
            class="px-4 py-2 rounded-xl text-sm font-semibold border border-cyan-300/20 bg-white/5 text-slate-100 hover:bg-white/10 transition"
          >
            Register
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main login content -->
  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <section class="w-full max-w-md" aria-labelledby="login-heading">

      <!-- Introductory text above the login card -->
      <header class="text-center mb-8">
        <img
          src="../../assets/images/vitaq-logo.png" alt="VitaQ logo"
          alt="VitaQ brand mark"
          class="h-42 md:h-50 w-auto mx-auto mb-4 object-contain"
        />
        <h1 id="login-heading" class="text-3xl font-bold tracking-tight text-white">
          Welcome Back
        </h1>
        <p class="mt-2 text-sm md:text-base text-slate-300">
          Sign in to manage your clinic appointments and healthcare visits.
        </p>
      </header>

      <!-- Main authentication card -->
      <section class="rounded-3xl border border-white/10 bg-white/95 text-slate-800 shadow-2xl shadow-black/30 backdrop-blur-sm p-8">
        <header class="mb-6">
          <h2 class="text-2xl font-semibold text-slate-900">Patient Login</h2>
          <p class="mt-1 text-sm text-slate-500">
            Enter your email and password to access your account.
          </p>
        </header>

        <!-- Error message area; this remains hidden until JavaScript needs it -->
        <p
          id="errorMessage"
          class="hidden mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
          aria-live="polite"
        ></p>

        <!-- Login form -->
        <form id="loginForm" class="space-y-5">
          <!-- Email field -->
          <section>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-2">
              Email Address
            </label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-800 placeholder-slate-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition"
            />
          </section>

          <!-- Password field -->
          <section>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
              Password
            </label>

            <section class="relative">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 pr-16 text-slate-800 placeholder-slate-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition"
              />
              <button
                type="button"
                id="togglePassword"
                class="absolute inset-y-0 right-4 flex items-center text-sm font-medium text-slate-500 hover:text-slate-700 transition"
              >
                Show
              </button>
            </section>
          </section>

          <!-- Submit button -->
          <button
            type="submit"
            id="loginButton"
            class="w-full rounded-2xl bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 font-semibold py-3 shadow-lg shadow-cyan-500/20 hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-offset-2 transition"
          >
            Login
          </button>
        </form>

        <!-- Register page link -->
        <p class="mt-6 text-center text-sm text-slate-600">
          Don’t have an account?
          <a href="/register" class="font-semibold text-blue-600 hover:text-cyan-500 hover:underline">
            Register
          </a>
        </p>
      </section>
    </section>
  </main>

  <!-- Shared footer -->
  <footer class="border-t border-cyan-400/10 bg-[#031126]/70">
    <p class="max-w-7xl mx-auto px-6 py-4 text-center text-sm text-slate-400">
      Community Clinic Appointment &amp; Queue System
    </p>
  </footer>

  <!-- External scripts are loaded in dependency order -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../lib/supabaseClient.js"></script>
  <script src="../../js/features/login.js"></script>
</body>
</html>
