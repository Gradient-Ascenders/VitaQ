<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | VitaQ</title>
  <link rel="stylesheet" href="../../assets/css/output.css" />
</head>
<body class="min-h-screen bg-[#1a1b26] text-[#c0caf5]">
  <main class="min-h-screen lg:grid lg:grid-cols-[1.65fr_1fr]">
    
    <!-- Left panel: register form -->
    <section class="relative flex min-h-screen items-center justify-center bg-[#1a1b26] px-6 py-12 lg:px-12">
      <a
        href="/"
        aria-label="Go to home page"
        class="absolute left-8 top-8"
      >
        <img
          src="../../assets/images/vitaq-logo.png"
          alt="VitaQ logo"
          class="h-14 w-auto object-contain md:h-16"
        />
      </a>

      <section class="w-full max-w-md" aria-labelledby="register-heading">
        <header class="mb-8 text-center">
          <h1 id="register-heading" class="text-4xl font-bold tracking-tight text-[#e0e5ff]">
            Create your account
          </h1>
          <p class="mt-3 text-base leading-6 text-[#a9b1d6]">
            Book clinic appointments, manage visits, and stay updated with VitaQ.
          </p>
        </header>

        <!-- Top message box for form-level feedback -->
        <p
          id="messageBox"
          class="hidden mb-4 rounded-2xl px-4 py-3 text-sm"
          role="alert"
          aria-live="polite"
        ></p>

        <!-- Registration form -->
        <form id="registerForm" class="space-y-4" novalidate>
          <section>
            <label for="email" class="mb-2 block text-sm font-medium text-[#c0caf5]">
              Email address
            </label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="Enter email address"
              class="w-full rounded-2xl border border-[#414868] bg-[#24283b] px-4 py-3 text-[#e0e5ff] placeholder-[#7f85a3] shadow-sm outline-none transition focus:border-[#7aa2f7] focus:ring-2 focus:ring-[#7aa2f7]/30"
              aria-describedby="emailError"
            />
            <p id="emailError" class="mt-2 hidden text-sm text-[#f7768e]"></p>
          </section>

          <section>
            <label for="password" class="mb-2 block text-sm font-medium text-[#c0caf5]">
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              placeholder="Enter password"
              class="w-full rounded-2xl border border-[#414868] bg-[#24283b] px-4 py-3 text-[#e0e5ff] placeholder-[#7f85a3] shadow-sm outline-none transition focus:border-[#7aa2f7] focus:ring-2 focus:ring-[#7aa2f7]/30"
              aria-describedby="passwordError"
            />
            <p id="passwordError" class="mt-2 hidden text-sm text-[#f7768e]"></p>
          </section>

          <section>
            <label for="confirmPassword" class="mb-2 block text-sm font-medium text-[#c0caf5]">
              Confirm password
            </label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              autocomplete="new-password"
              placeholder="Confirm password"
              class="w-full rounded-2xl border border-[#414868] bg-[#24283b] px-4 py-3 text-[#e0e5ff] placeholder-[#7f85a3] shadow-sm outline-none transition focus:border-[#7aa2f7] focus:ring-2 focus:ring-[#7aa2f7]/30"
              aria-describedby="confirmPasswordError"
            />
            <p id="confirmPasswordError" class="mt-2 hidden text-sm text-[#f7768e]"></p>
          </section>

          <button
            type="submit"
            id="registerButton"
            class="mt-2 w-full rounded-2xl bg-gradient-to-r from-[#7aa2f7] to-[#bb9af7] px-4 py-3 text-base font-semibold text-[#1a1b26] transition hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-[#7aa2f7]/40"
          >
            Continue
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-[#8b93b8]">
          Already have an account?
          <a href="/login" class="font-medium text-[#7aa2f7] underline underline-offset-2 hover:text-[#bb9af7]">
            Sign in
          </a>
        </p>
      </section>
    </section>

    <!-- Right panel: illustration and info card -->
    <aside class="relative hidden min-h-screen overflow-hidden lg:block">
      <section class="absolute inset-0 bg-gradient-to-br from-[#16161e] via-[#1f2335] to-[#2b2f4a]"></section>
      <section
        class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(122,162,247,0.18),transparent_35%),radial-gradient(circle_at_bottom,rgba(187,154,247,0.22),transparent_30%)]">
      </section>

      <section class="relative z-10 flex h-full flex-col px-10 py-12 text-[#e0e5ff]">
        <!-- Centered illustration -->
        <div class="flex flex-1 items-center justify-center">
          <img
            src="../../assets/images/clinic_pic.png"
            alt="Clinic booking illustration"
            class="mx-auto w-[1024px] max-w-none h-auto object-contain"
          />
        </div>

        <!-- Bottom info card -->
        <section
          class="mt-auto w-full max-w-xl self-center rounded-3xl border border-white/10 bg-white/5 p-6 backdrop-blur-md">
          <h2 class="mt-3 text-3xl font-semibold leading-tight text-[#e0e5ff]">
            Smarter clinic bookings for patients and staff.
          </h2>
          <p class="mt-3 max-w-md text-sm leading-6 text-[#a9b1d6]">
            Create your account to manage appointments, reduce waiting time,
            and keep your care journey organized.
          </p>
        </section>
      </section>
    </aside>
  </main>

  <script src="../../js/features/register.js"></script>
</body>
</html>
