<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Clinic Queue System</title>
  <link rel="stylesheet" href="../../assets/css/output.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col">

  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-blue-700">
        Clinic Queue System
      </a>

      <div class="flex items-center gap-3">
        <a href="/login" class="text-sm font-medium text-slate-600 hover:text-blue-700">
          Login
        </a>
        <a href="/register" class="text-sm font-medium bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
          Register
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-md border border-slate-200 p-8">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-slate-900">Create Account</h1>
        <p class="text-sm text-slate-500 mt-2">
          Register to book clinic appointments and manage your queue status.
        </p>
      </div>

      <div id="messageBox" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

      <form id="registerForm" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">
            Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">
            Confirm Password
          </label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm password"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition"
        >
          Register
        </button>
      </form>

      <p class="text-sm text-center text-slate-600 mt-6">
        Already have an account?
        <a href="/login" class="text-blue-600 font-medium hover:underline">Login</a>
      </p>
    </div>
  </main>

  <footer class="bg-white border-t">
    <div class="max-w-6xl mx-auto px-6 py-4 text-center text-sm text-slate-500">
      Community Clinic Appointment & Queue System · Software Design 2026
    </div>
  </footer>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();
    });
  </script>
</body>
</html>
